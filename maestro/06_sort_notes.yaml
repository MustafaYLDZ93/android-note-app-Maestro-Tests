appId: com.noteapp.notes
name: "Not Sıralama"
---
- launchApp

# Üç not oluştur
- tapOn:
    id: "fab"
- tapOn:
    id: "etTitle"
- inputText: "Cay tarifi"
- tapOn:
    id: "fabSave"

- tapOn:
    id: "fab"
- tapOn:
    id: "etTitle"
- inputText: "Alisveris"
- tapOn:
    id: "fabSave"

- tapOn:
    id: "fab"
- tapOn:
    id: "etTitle"
- inputText: "Toplanti notlari"
- tapOn:
    id: "fabSave"

# Üç not da görünüyor mu?
- assertVisible:
    text: "Cay tarifi"
- assertVisible:
    text: "Alisveris"
- assertVisible:
    text: "Toplanti notlari"

# Sıralama menüsünü aç
- tapOn:
    id: "action_sort"

# "Başlık: A → Z" seçeneğine tıkla
- tapOn:
    text: "Başlık: A → Z"

# Tüm notlar hala görünmeli
- assertVisible:
    text: "Alisveris"
- assertVisible:
    text: "Cay tarifi"
- assertVisible:
    text: "Toplanti notlari"

# "Başlık: Z → A" sıralama
- tapOn:
    id: "action_sort"
- tapOn:
    text: "Başlık: Z → A"
- assertVisible:
    text: "Toplanti notlari"

# Tarih sıralamasına geri dön
- tapOn:
    id: "action_sort"
- tapOn:
    text: "Tarih: Yeni → Eski"
- assertVisible:
    text: "Toplanti notlari"
