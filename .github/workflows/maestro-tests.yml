name: Maestro E2E Tests

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Test dosyası seç'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - 01_create_note.yaml
          - 02_edit_note.yaml
          - 03_delete_note.yaml
          - 04_search_note.yaml
          - 05_pin_note.yaml
          - 06_sort_notes.yaml
          - 07_note_color.yaml
          - 08_validation.yaml
          - 09_unsaved_changes.yaml
          - 10_full_flow.yaml

jobs:
  maestro-tests:
    runs-on: [self-hosted, macOS, x64]
    timeout-minutes: 60

    env:
      ANDROID_HOME: /Users/musti/Library/Android/sdk
      ANDROID_SDK_ROOT: /Users/musti/Library/Android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            if [ "${{ github.event.inputs.test_file }}" = "all" ]; then
              $HOME/.maestro/bin/maestro test maestro/ --format junit --output maestro-results.xml
            else
              $HOME/.maestro/bin/maestro test maestro/${{ github.event.inputs.test_file }} --format junit --output maestro-results.xml
            fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-test-results
          path: maestro-results.xml
          retention-days: 30

      - name: Publish JUnit report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: maestro-results.xml
          check_name: Maestro Test Results
