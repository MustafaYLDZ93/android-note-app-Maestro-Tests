name: Maestro E2E Tests

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Test dosyası seç'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - 01_create_note.yaml
          - 02_edit_note.yaml
          - 03_delete_note.yaml
          - 04_search_note.yaml
          - 05_pin_note.yaml
          - 06_sort_notes.yaml
          - 07_note_color.yaml
          - 08_validation.yaml
          - 09_unsaved_changes.yaml
          - 10_full_flow.yaml

jobs:
  maestro-tests:
    runs-on: [self-hosted, macOS, x64]
    timeout-minutes: 30

    env:
      ANDROID_HOME: /Users/musti/Library/Android/sdk
      ANDROID_SDK_ROOT: /Users/musti/Library/Android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Install Maestro (if needed)
        run: |
          if ! command -v maestro &>/dev/null; then
            curl -Ls "https://get.maestro.mobile.dev" | bash
          fi

      - name: Start Emulator
        run: |
          $ANDROID_HOME/emulator/emulator \
            -avd Medium_Phone_API_36.1 \
            -no-snapshot-save \
            -no-window \
            -gpu swiftshader_indirect \
            -noaudio \
            -no-boot-anim \
            -camera-back none &

          echo "Emulator başlatıldı, boot bekleniyor..."
          until $ANDROID_HOME/platform-tools/adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; do
            sleep 3
          done
          sleep 5
          echo "Emulator hazır"

      - name: Install APK
        run: |
          $ANDROID_HOME/platform-tools/adb install -r app/build/outputs/apk/debug/app-debug.apk
          $ANDROID_HOME/platform-tools/adb forward tcp:7001 tcp:7001
          sleep 5

      - name: Run Maestro Tests
        run: |
          if [ "${{ github.event.inputs.test_file }}" = "all" ]; then
            $HOME/.maestro/bin/maestro test maestro/ --format junit --output maestro-results.xml
          else
            $HOME/.maestro/bin/maestro test maestro/${{ github.event.inputs.test_file }} --format junit --output maestro-results.xml
          fi

      - name: Stop Emulator
        if: always()
        run: |
          $ANDROID_HOME/platform-tools/adb emu kill || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-test-results
          path: maestro-results.xml
          retention-days: 30
