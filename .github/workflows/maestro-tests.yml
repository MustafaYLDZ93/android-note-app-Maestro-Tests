name: Maestro E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  maestro-tests:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: .

      - name: Install Maestro
        run: |
          export MAESTRO_VERSION=1.39.0
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install Android Emulator
        run: |
          sdkmanager --install "system-images;android-34;google_apis;x86_64"
          sdkmanager --install "emulator"
          sdkmanager --install "platform-tools"
          echo "no" | avdmanager create avd \
            --force \
            --name "maestro_test" \
            --device "pixel_6" \
            --package "system-images;android-34;google_apis;x86_64"

      - name: Start Android Emulator
        run: |
          nohup $ANDROID_HOME/emulator/emulator \
            -avd maestro_test \
            -no-snapshot-save \
            -no-window \
            -gpu swiftshader_indirect \
            -noaudio \
            -no-boot-anim \
            -camera-back none \
            2>&1 &

      - name: Wait for emulator to boot
        run: |
          adb wait-for-device
          # Wait until fully booted
          until adb shell getprop sys.boot_completed 2>/dev/null | grep -m 1 "1"; do
            echo "Waiting for emulator to boot..."
            sleep 5
          done
          # Extra wait for UI to settle
          sleep 10
          echo "Emulator is ready"

      - name: Install APK
        run: |
          adb install -r app/build/outputs/apk/debug/app-debug.apk

      - name: Run Maestro Tests
        run: |
          maestro test maestro/ --format junit --output maestro-results.xml
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-test-results
          path: |
            maestro-results.xml
          retention-days: 30

      - name: Upload test report (JUnit)
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: maestro-results.xml
          check_name: Maestro Test Results
